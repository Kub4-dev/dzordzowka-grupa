<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUI Login</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
    overflow: hidden;
}

body::before, body::after {
    content: "";
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    filter: blur(100px);
}

body::before {
    background: #ff6ec4;
    top: 10%;
    left: 10%;
}

body::after {
    background: #00f2fe;
    bottom: 10%;
    right: 10%;
}

.box {
    width: 340px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    text-align: center;
    position: relative;
}

.warning {
    font-size: 12px;
    margin-bottom: 10px;
    color: #ffe66d;
}

.form {
    display: none;
}

.form.active {
    display: block;
    animation: fade 0.3s ease;
}

@keyframes fade {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}

.input-box {
    margin: 10px 0;
}

.input-box input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.2);
    color: white;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.3);
    color: white;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: rgba(255,255,255,0.5);
}

.switch {
    margin-top: 15px;
    font-size: 14px;
}

.switch a {
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* STOPKA */
.footer {
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="box">

    <div class="warning">
        ⚠ To tylko GUI test — brak prawdziwego logowania
    </div>

    <!-- LOGIN -->
    <div id="login" class="form active">
        <h2>Logowanie</h2>

        <div class="input-box">
            <input type="text" placeholder="Login">
        </div>

        <div class="input-box">
            <input type="password" placeholder="Hasło">
        </div>

        <button>Zaloguj się</button>

        <div class="switch">
            Nie masz konta? <a onclick="showRegister()">Stwórz jedno</a>
        </div>
    </div>

    <!-- REGISTER -->
    <div id="register" class="form">
        <h2>Rejestracja</h2>

        <div class="input-box">
            <input type="text" placeholder="Login">
        </div>

        <div class="input-box">
            <input type="email" placeholder="Email">
        </div>

        <div class="input-box">
            <input type="password" placeholder="Hasło">
        </div>

        <button>Załóż konto</button>

        <div class="switch">
            Masz konto? <a onclick="showLogin()">Zaloguj się</a>
        </div>
    </div>

    <!-- STOPKA -->
    <div class="footer">
        JK-Softwares GUI
    </div>

</div>

<script>
function showRegister() {
    document.getElementById("login").classList.remove("active");
    document.getElementById("register").classList.add("active");

    document.getElementById("login").querySelectorAll("input").forEach(i => i.value = "");
}

function showLogin() {
    document.getElementById("register").classList.remove("active");
    document.getElementById("login").classList.add("active");

    document.getElementById("register").querySelectorAll("input").forEach(i => i.value = "");
}
</script>

</body>
</html>
