<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Dark Theme</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            transition: background-color 0.3s, color 0.3s;
        }
        h1, p {
            opacity: 0;
            animation: fadeIn 1s forwards;
        }
        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }
        button {
            background-color: #1e1e1e;
            color: #e0e0e0;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
            background-color: #3e3e3e;
        }
    </style>
</head>
<body>
    <h1>Welcome to the Enhanced Dark Theme!</h1>
    <p>This is an example of smooth animations and hover effects.</p>
    <button>Click Me!</button>
</body>
</html>
